name: Build Migration Image

on:
  push:
    branches:
      - staging  # Builds staging migration image
      - main     # Builds production migration image
    paths:
      - 'alembic/**'                      # Migration scripts
      - 'shared/database/**'              # Shared database models/config
      - 'shared/config.py'                # Config (used by alembic/env.py)
      - 'shared/secrets.py'               # Secrets utility (used by config)
      - 'docker/Dockerfile.migrations'    # Dockerfile itself
      - 'pyproject.toml'                  # Dependencies
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to build for (staging or production)'
        required: true
        type: choice
        options:
          - staging
          - production

env:
  AWS_REGION: us-east-1

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build Migration Image
    runs-on: ubuntu-latest
    # Set environment based on manual input or branch
    environment: ${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set environment-specific ECR repository
        id: ecr-repo
        run: |
          # Determine environment: manual input > branch-based detection
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              ENVIRONMENT="production"
            else
              ENVIRONMENT="staging"
            fi
          fi

          echo "Detected environment: $ENVIRONMENT"

          if [ "$ENVIRONMENT" == "production" ]; then
            echo "repository=migrations-production-ecr" >> $GITHUB_OUTPUT
          else
            echo "repository=migrations-staging-ecr" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push migration image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ steps.ecr-repo.outputs.repository }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building and pushing migration image..."

          docker buildx build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f ./docker/Dockerfile.migrations . \
            --push

          echo "✅ Migration image pushed:"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deployment info
        run: |
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          if [ -z "$ENVIRONMENT" ]; then
            if [ "${{ github.ref }}" == "refs/heads/main" ]; then
              ENVIRONMENT="production"
            else
              ENVIRONMENT="staging"
            fi
          fi

          echo "✅ Migration image built for: $ENVIRONMENT"
          echo "Task definition will use :latest tag automatically"
          echo "Or manually trigger migration workflow to use new image"
