name: PR Review with Progress Tracking

# This example demonstrates how to use the track_progress feature to get
# visual progress tracking for PR reviews, similar to v0.x agent mode.

on:
  pull_request:
    types: [opened, ready_for_review]

jobs:
  review-with-tracking:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: PR Review with Progress Tracking
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # Enable progress tracking
          track_progress: true

          # Your custom review instructions
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Perform a focused code review identifying only critical and high-priority issues:

            **Focus on:**
            - Breaking changes, bugs, and data integrity issues (Critical)
            - Security vulnerabilities and performance problems (High Priority)
            - Missing error handling for edge cases (Medium Priority)

            **Review guidelines:**
            - Be concise - limit feedback to 500-800 words total
            - Use inline comments only for actionable issues that need fixes
            - Group similar issues together rather than listing every occurrence
            - Skip minor style issues, documentation nitpicks, or "nice-to-have" suggestions
            - Highlight what's done well in 1-2 sentences max
            - If no critical issues found, provide a brief approval

            **Output format:**
            1. Executive summary (2-3 sentences)
            2. Critical issues (if any) - grouped by category
            3. High priority issues (top 2-3 only)
            4. Recommendation: Approve / Request Changes / Comment

          # Tools for comprehensive PR review
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"

# When track_progress is enabled:
# - Creates a tracking comment with progress checkboxes
# - Includes all PR context (comments, attachments, images)
# - Updates progress as the review proceeds
# - Marks as completed when done
