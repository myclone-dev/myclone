name: Deploy Prod Voice Processing Consumer

on:
  push:
    branches:
      - main
    paths:
      # Worker code
      - 'workers/voice_processing/**'
      # Direct dependencies
      - 'shared/voice_processing/**'
      # Database dependencies (models, repositories, config)
      - 'shared/database/models/**'
      - 'shared/database/repositories/**'
      - 'shared/database/config.py'
      - 'shared/database/base.py'
      - 'shared/database/voice_job_model.py'
      # RAG system (used for vector embeddings)
      - 'shared/rag/**'
      # S3 and services
      - 'shared/services/s3_service.py'
      - 'shared/s3_utils.py'
      # Shared utilities and config
      - 'shared/config.py'
      - 'shared/schemas/**'
      # Build dependencies
      - 'docker/Dockerfile.voice-processing'
      - 'pyproject.toml'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: myclone-voice-processing-consumer-production-ecr
  ECS_CLUSTER_NAME: myclone-consumer-production-cluster
  ECS_SERVICE_NAME: voice-processing-consumer-production

permissions:
  id-token: write
  contents: read

jobs:
  # Gate: Verify migrations are valid BEFORE deploying
  verify-migrations:
    uses: ./.github/workflows/verify-migrations.yml

  push-to-ecr:
    needs: verify-migrations
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Credentials
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          echo "Building voice processing consumer image..."

          docker buildx build --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            -f ./docker/Dockerfile.voice-processing . \
            --push

          echo "✅ Image pushed:"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          echo "  - $ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to ECS
        run: |
          echo "🚀 Deploying voice processing consumer to ECS..."
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER_NAME }} \
            --service ${{ env.ECS_SERVICE_NAME }} \
            --force-new-deployment

          echo "✅ Deployment initiated"
